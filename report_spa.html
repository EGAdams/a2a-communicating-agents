<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Report SPA</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: Arial, sans-serif; margin: 0; }
    .topbar { padding: 14px 18px; border-bottom: 1px solid #8884; }
    .tabs { display: flex; gap: 10px; padding: 12px 18px; border-bottom: 1px solid #8884; }
    .tab { padding: 8px 12px; border: 1px solid #8884; border-radius: 8px; cursor: pointer; background: transparent; }
    .tab.active { font-weight: 700; }
    .view { display: none; padding: 20px 18px; }
    .view.active { display: block; }
    a { word-break: break-word; }
  </style>
</head>
<body>
  <div class="topbar"><strong>Report SPA</strong></div>

  <div class="tabs">
    <button class="tab active" data-target="home">Home</button>
    <button class="tab" data-target="status">Status</button>
    <button class="tab" data-target="instructions">Instructions</button>
  </div>

  <section id="home" class="view active">
    <!-- Intentionally left empty for now -->
  </section>

  <section id="status" class="view">
    <h2>Status</h2>
    <p>
      Live status page:<br />
      <a href="https://americansjewelry.com/status.html" target="_blank" rel="noopener noreferrer">
        https://americansjewelry.com/status.html
      </a>
    </p>
  </section>

  <section id="instructions" class="view">
    <h2>Instructions</h2>
    <p>
      Live upload/instructions page:<br />
      <a href="https://americansjewelry.com/americanjewelry_live_upload_guide.html" target="_blank" rel="noopener noreferrer">
        https://americansjewelry.com/americanjewelry_live_upload_guide.html
      </a>
    </p>
  </section>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const views = document.querySelectorAll('.view');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const target = tab.dataset.target;

        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');

        views.forEach(v => v.classList.remove('active'));
        document.getElementById(target).classList.add('active');
      });
    });
  </script>
</body>
</html>
